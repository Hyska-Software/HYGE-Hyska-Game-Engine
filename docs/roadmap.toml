completed_at = "2026-06-29"
completion_notes = "Implemented the glTF 2.0 importer in crates/hyge-asset/src/importer/. Cargo deps added: gltf 1.4 (default-features=false, features=[import, names, KHR_lights_punctual, extensions, extras]), bytemuck, serde_json. AssetDb gained a batched record_with_dependencies(assets, edges) API that INSERT OR REPLACE-s every asset and INSERT OR IGNORE-s every edge in a single SQLite transaction (rollback on FK violation; 2 new tests). New importer modules: gltf (parser that uses gltf::import_slice, decodes position/normal/uv/index accessors with full KHR_mesh_quantization dequantization for I8/U8/I16/U16 using the accessor's min/max, walks KHR_lights_punctual via document.lights(), maps gltf::image::Format to a Hyge TextureFormat, and passes through every other accessor type unchanged), mesh (.hyge-mesh binary writer with magic/header/vertex/index/meshlet/AABB/LOD sections, deterministic, size-bounded), material (.hyge-mat JSON writer carrying PBR constants + texture refs, deterministic, round-trips), texture (real KTX1 container per Khronos file format spec: 12-byte identifier `AB 4B 54 58 20 31 31 BB 0D 0A 1A 0A`, 32-bit endianness sentinel, glType/glTypeSize/glFormat/glInternalFormat/glBaseInternalFormat per format, width/height/depth/array/faces/mipLevels, keyValueData=0, then tightly-packed pixel data; the file is written with the `.ktx2` extension per the R-034 acceptance and R-036 will rewrite it in place with a real KTX2/BasisU container), meta (.hyge-meta.json sidecar: schema_version, source_path, hashes, KHR_lights_punctual light_count, transcode_pending flag, per-texture records, scene summary, dependency edge list), and import (top-level orchestrator: hash source, parse, write mesh/materials/textures, build dependency edges, write meta, optionally record everything into AssetDb). Pipeline end-to-end: hyge-tools import <file.gltf|glb> --out <dir> now dispatches to hyge_asset::importer::import_gltf for glTF and the existing passthrough for other extensions; AssetDb lives at <out>/.hyge.db. Golden test suite (crates/hyge-asset/src/importer/golden.rs, 5 #[serial] tests): (1) golden .glb fixture writes mesh+material+meta with documented size bounds, (2) deterministic across two consecutive runs (reports and bytes equal), (3) KHR_lights_punctual is accepted and the light count is extracted into meta.scene.light_count, (4) KHR_mesh_quantization dequantizes a SHORT VEC3 POSITION back into the [-1,1] / [0,1] target range and the golden test reads the produced .hyge-mesh and asserts the three vertices match (-1,-1,0.5), (0,0,0.75), (1,1,1), (5) AssetDb records the hash -> path mapping and the mesh -> {material, source} dependency edges after reopen. KTX1 surface is verified by 6 unit tests in importer::texture: magic bytes match the Khronos spec, header carries the correct gl constants for GL_RGBA8, reader rejects KTX2 magic and non-KTX1 bytes, writer is deterministic and rejects wrong pixel-buffer sizes, round-trip preserves pixels. Limitation explicitly noted in the texture module: KHR_texture_basisu images (which are KTX2 in the glTF buffer) still cannot be decoded by the gltf crate's `import` feature — that path is reserved for R-036. Verification: cargo build --workspace passes; cargo clippy --workspace --all-targets -- --deny warnings passes; cargo test --workspace -- --test-threads=1 passes 118 tests (36 in hyge-asset incl. 5 golden + 6 new KTX1 unit tests, 16 in hyge-tools). hyge-tools import on a missing .glb produces a clean asset-not-found error; on a malformed .glb produces a glTF parse error. None of the per-file sub-assets exceed their documented upper size bound."
