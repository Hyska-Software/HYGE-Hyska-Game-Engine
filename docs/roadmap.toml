completion_notes = "Implemented the bindless descriptor heap in hyge-render and the GPU upload path in hyge-asset. New code: crates/hyge-render/src/bindless.rs (BindlessTable, BindlessConfig, GpuMesh, GpuMaterial, Instance, Light, LightGrid, MeshletVisibility, DrawCommand POD structs, MeshId/MaterialId/TextureId typed slots with atomic refcount, four default samplers, free-list-backed slot allocators, single bind group + bind group layout covering the §8.1 slot layout slots 0-10 + optional slot 11 texture array); crates/hyge-render/src/renderer.rs (Renderer now holds Arc<BindlessTable>; new bindless() accessor; bindless table constructed at startup; Arc<wgpu::Device>/Arc<wgpu::Queue> wrapping; bindless_required_features() requests TEXTURE_BINDING_ARRAY opportunistically; bindless_limits() bumps storage_buffers_per_shader_stage to 10 + sampled_textures_per_shader_stage to 16); crates/hyge-render/tests/bindless_stress.rs (R-037 acceptance: 1000 mesh + 1000 material registrations with no validation errors + refcount-driven release); crates/hyge-asset/src/gpu_upload.rs (GpuUploadTask with GpuUploadPayload{Mesh,Material,Texture}, GpuUploadResult enum, MeshUploadData/MaterialUploadData/TextureUploadData typed CPU descriptors, GpuUploadTask::run() synchronous path for the test + GpuUploadTask::spawn() async path that runs on AsyncComputeTaskPool and returns a std::sync::mpsc::Receiver<HygeResult<GpuUploadResult>>); crates/hyge-asset/src/server.rs (AssetServer wrapping Arc<BindlessTable>, load<A>(id) -> Handle<A>, get<A>(handle) -> Option<LoadedAsset<A>>, register<A>(id, Arc<A>, GpuUploadTask) -> HygeResult<LoadedAsset<A>>, get_with_bindless<A>(handle) -> Option<LoadedAssetGpu<A>>, bindless_for(id) -> Option<GpuUploadResult>, loaded_count(), type-erased entry map keyed by AssetId + separate bindless_results map for the scene extract to use without knowing A); crates/hyge-asset/src/lib.rs and prelude.rs updated to export the new modules; crates/hyge-asset/Cargo.toml gains hyge-render + bevy_tasks deps. Architecture §8.1 slot layout is fully implemented: slot 0-3 = default samplers (linear clamp/repeat, nearest clamp, shadow), slot 4 = mesh storage, slot 5 = material storage, slot 6 = instance storage, slot 7 = light storage, slot 8 = light-grid storage, slot 9 = meshlet-visibility storage, slot 10 = draw-command storage, slot 11+ = texture array (gated on TEXTURE_BINDING_ARRAY feature). v0.1 texture capacity is 16 (default wgpu::Limits caps max_sampled_textures_per_shader_stage at 16); M4+ will shard the texture array across multiple bind groups to reach the 16k architectural target. Refcount is the standard Rust Arc<Refcount> pattern: BindlessSlot<T> clones bump the refcount atomically, drops decrement, and the last drop returns the slot to the free list (with a generation counter bump for debug tooling). The bindless table is Send + Sync so GpuUploadTask can capture it in a closure spawned on AsyncComputeTaskPool. Verification: cargo fmt --all, cargo clippy --workspace --all-targets -- -D warnings, cargo test --workspace (252+ tests pass), RUSTDOCFLAGS=-D warnings cargo doc --workspace --no-deps all pass. No new ADRs needed; the design follows ADR-0003 (bindless + render graph + clustered forward) and ADR-0006 (BLAKE3 + glTF + hot-reload)."
