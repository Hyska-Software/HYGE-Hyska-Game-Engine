[[items]]
id = "R-021"
title = "Barrier inference algorithm"
phase = "phase_2"
owner = "render-graph"
priority = "P0"
status = "complete"
risk = "medium"
dependencies = ["R-020"]
summary = "Implement automatic barrier inference from pass reads/writes."
completed_at = "2026-06-29"
completion_notes = "Fleshed out the barrier inference algorithm in crates/hyge-render-graph: RenderGraph::compile walks passes in topological order and uses crate::barrier::BarrierStateTable to remember the prior AccessState for each touched resource. The table is implemented in safe Rust as Vec<Option<AccessState>>, so sparse ResourceHandle indices remain explicit None values until written. AccessState stores the texture or buffer usage used for transition comparison. Algorithm (documented in barrier.rs module-level rustdoc): for each pass in topo order, for each resource in reads ∪ writes, look up prior access pattern; emit Barrier::Texture{from,to} (or Buffer) when (a) the resource was already touched in this frame and from != to, (b) the resource is touched for the first time and is Transient with to != UNINITIALIZED (or the buffer equivalent wgpu::BufferUses::empty()), or (c) the resource is touched for the first time and is Persistent — always emit in this last case because the runtime does not know the prior state of a persistent resource. Always update the state table after processing, so subsequent passes see the new usage. Miri regression test: barrier::tests::miri_barrier_state_table_sparse_slots_are_sound exercises ensure_slot + set + get with sparse indices, verifies unset slots report None, verifies overwrite, and drops the table. Insta snapshot test: tests/barrier_inference.rs builds a fixed 5-pass graph (shadow → gbuffer → lighting → tonemap → present, with final_color marked Persistent to exercise the always-emit path) and snapshots the per-pass barrier layout to tests/snapshots/barrier_inference__five_pass_graph_barrier_inference_snapshot.snap. The snapshot test skips gracefully on machines with no wgpu adapter. No changes to public API; Barrier::Texture/Buffer variants and the compile(device) -> CompiledGraph::execute(encoder) flow from R-020 are unchanged."
acceptance = [
  "for each pass in topological order, walk all reads/writes",
  "for each resource touched, if previous pass wrote it (or it was Persistent), emit a barrier matching (texture usage, buffer usage) transition",
  "insta snapshot test for a fixed 5-pass graph shows correct barriers",
  "miri test passes (no UB in unsafe barrier code)",
  "documented in module rustdoc"
]

[[items]]
id = "R-022"
title = "Transient resource allocator"
phase = "phase_2"
owner = "render-graph"
priority = "P0"
status = "complete"
risk = "medium"
dependencies = ["R-020"]
summary = "Implement arena allocator for transient (frame-scoped) resources."
completed_at = "2026-06-29"
completion_notes = "Fleshed out the transient resource allocator in crates/hyge-render-graph/src/allocator.rs. The R-020 skeleton (one-slot-per-resource, `register`+`mark_live`+`next_frame`) was rewritten as a descriptor-keyed slot pool: `SlotKey` enum (Texture{width,height,depth,array_layers,mip_levels,sample_count,format,usage} | Buffer{size,usage}; `label` deliberately excluded) drives a per-key LIFO free stack. Public API: `register(handle, desc)` stores the descriptor only (no slot allocated at compile time), `allocate(handle) -> Option<usize>` is the first-touch call that pops a free slot with a matching `SlotKey` or creates a new one and binds the resource, `deallocate(handle) -> Option<usize>` returns a slot to the free pool early (in-frame release), `next_frame()` clears all live flags and pushes every slot back onto the per-key free stack, plus accessors `slot_count`/`live_count`/`free_count`/`peak_live`/`total_allocations`/`slot(idx)`/`descriptor(handle)`. The `Slot` struct is now public with `owner: Option<ResourceHandle>`, `live: bool`, `desc: ResourceKind`. Existing `CompiledGraph::from_parts` continues to call `register` (signature unchanged); the only behavioral change is that no slot is materialized at compile time, which is correct — slots materialize lazily on `allocate` (the executor's job in a future item). Tests: unit tests in `src/allocator.rs::tests` cover register/allocate/round-trip, allocate-unregistered-handle, matching-key reuse, distinct-key slots, next_frame reset, peak_live, in-frame deallocate, free_count invariant, monotonic total_allocations, label-ignored-in-key, and the R-022 acceptance \"fragment_as_fraction_of_peak_usage\" test (20 buffers with unique sizes, peak in frame 1, 5/20 in frame 2, same 5/20 in frame 3, back to 20 in frame 4 — asserts slot_count never grows past 20). Integration tests in `tests/transient_allocator.rs` cover the leak check: `thousand_frames_no_leak_between_frames` runs 1000 frames × 10 buffers and asserts `slot_count()==10`, `peak_live()==10`, `total_allocations()==10000` exactly; `reuses_free_slots_when_sizes_match` covers 3 frames of 2 buffers sharing one descriptor and asserts `slot_count()==1` + `total_allocations()==6`; `distinct_keys_keep_separate_slots_across_many_frames` is the negative-control counterpart; `next_frame_pops_all_slots_to_free_pool` is a small sanity check. The memory ceiling is the number of distinct `SlotKey`s ever seen, bounded by the number of resources in the graph. No new workspace dependencies; `Total allocations` is u64 so the 1000-frame counter cannot overflow in any realistic scenario."
acceptance = [
  "for Transient resources, an internal arena allocator is used; first-touch allocates, last-release frees",
  "no leaks between frames (verified by an integration test running 1000 frames and asserting memory ceiling)",
  "allocator reuses free slots when sizes match",
  "unit test covers fragment-as-fraction of peak-usage case"
]

