version = 1
title = "Hyge Engine Implementation Roadmap"
updated_at = "2026-07-10T00:00Z"
status_scale = ["not_started", "in_progress", "blocked", "complete"]
priority_scale = ["P0", "P1", "P2", "P3"]
risk_scale = ["low", "medium", "high"]

[metadata]
source_architecture = "docs/architecture.md"
source_agents = "AGENTS.md"
target_state = "v0.1.0 — production-ready 3D game engine with full editor"
editor_architecture = "Rust editor service + versioned loopback IPC + PySide6/QML frontend"
editor_completion_gate = "R-106"
release_phase = "phase_13"
msrv = "1.80"
channel = "stable only (no nightly)"

[[phases]]
id = "phase_0"
name = "Governance and Foundation"
goal = "Establish repository governance, ADR process, ownership map, CI pipeline, and the full workspace + 14 crates with shared infrastructure."

[[phases]]
id = "phase_1"
name = "ECS Core and App Skeleton"
goal = "Implement `hyge-core`, `hyge-ecs`, `hyge-window`, and `hyge-app` so that `App::run()` opens a window and clears a color."

[[phases]]
id = "phase_2"
name = "Render Graph and First Triangle"
goal = "Implement `hyge-render-graph` (DAG, barrier inference, transient allocator) and `hyge-render` device init. One hardcoded triangle on screen."

[[phases]]
id = "phase_3"
name = "Asset Pipeline and Importer"
goal = "Implement `hyge-asset` (BLAKE3 DB, hot-reload), `hyge-tools` CLI, glTF import, meshlet bake, KTX2 transcode. A lit sphere loaded from a glTF at runtime."

[[phases]]
id = "phase_4"
name = "Bindless PBR Clustered Forward IBL"
goal = "Bindless descriptor heap, PBR with IBL, clustered forward shading, light grid compute. 1000+ materials + 64 dynamic lights visible."

[[phases]]
id = "phase_5"
name = "Shadows Post-Process Animation and Culling"
goal = "Cascade shadow maps, per-light shadow atlas, TAA, SMAA, Bloom, ACES tonemap, skinning, CPU frustum + GPU meshlet culling, LOD."

[[phases]]
id = "phase_6"
name = "Scene Prefab Instancing"
goal = "`hyge-scene` with glTF scene loader, `.hyge-world` / `.hyge-prefab` formats, hierarchical prefab system with override, instancing extraction, component catalog."

[[phases]]
id = "phase_7"
name = "Physics Audio Input Scripting"
goal = "`hyge-physics` (rapier3d), `hyge-audio` (kira + HRTF), `hyge-input` (Action<T> + TOML + raw input), `hyge-script` (Lua + bevy_reflect + sandbox). 5 prefab instance scene with full systems."

[[phases]]
id = "phase_8"
name = "Editor Foundation and Service"
goal = "Establish the editor process contract, Rust service lifecycle, project/session model, protocol validation and engine-facing snapshots without any fake duplicated ECS state."

[[phases]]
id = "phase_9"
name = "Editor Data Model and Commands"
goal = "Expose real scene hierarchy, reflection metadata, assets, diagnostics, selection and transactional undo/redo through the Rust editor service."

[[phases]]
id = "phase_10"
name = "Editor Viewport and Render Bridge"
goal = "Render the real engine scene through the existing render graph and transport frames, camera input, selection and gizmos to the external editor."

[[phases]]
id = "phase_11"
name = "PySide6/QML Editor Frontend"
goal = "Build the complete Qt Quick desktop experience: hierarchy, inspector, viewport, assets, graph, console, profiler, theme and layout persistence."

[[phases]]
id = "phase_12"
name = "Editor Integration, Recovery and Distribution"
goal = "Prove the editor against real projects, hot-reload, persistence, failure/reconnect paths and packaged Windows execution before release."

[[phases]]
id = "phase_13"
name = "Polish Sandbox mdbook Performance Release"
goal = "`hyge-sandbox` example, headless screenshot tool, mdbook site (4 tutorials), performance baseline (144 FPS at 1080p on RTX 3060), v0.1.0 release."

