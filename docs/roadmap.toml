completion_notes = "Created .github/workflows/nightly.yml with 4 parallel audit jobs + 1 aggregator: (1) udeps installs nightly + cargo-udeps and runs 'cargo +nightly udeps --workspace --all-targets'; (2) miri-render installs nightly + miri and runs 'cargo +nightly miri test -p hyge-render' with MIRIFLAGS=-Zmiri-disable-isolation; (3) miri-render-graph same for hyge-render-graph; (4) fuzz-build installs nightly + cargo-fuzz and runs 'cargo +nightly fuzz build', gracefully skipping with a ::notice when fuzz/Cargo.toml is absent (the fuzz crate is created in M2 by R-038); (5) report aggregator runs after all 4 with 'if: always()', posts a summary table to the milestone issue via peter-evans/create-or-update-comment@v4 using the HYGE_ROADMAP_MILESTONE_ISSUE repo variable, warns with ::warning if the variable is unset, and uses 'continue-on-error: true' so the audit jobs are not blocked. Schedule: daily at 03:00 UTC; also accepts workflow_dispatch. Swatinem/rust-cache@v2 in each job. All miri jobs set MIRIFLAGS=-Zmiri-disable-isolation for CI speed (Miri's default isolation adds significant overhead; the trade is fewer caught bugs at the cost of speed -- acceptable for nightly)."
