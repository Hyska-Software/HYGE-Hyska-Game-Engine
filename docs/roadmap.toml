completion_notes = "Implemented the meshopt-baked meshlet + LOD chain in crates/hyge-asset/src/importer/. New module meshlet.rs (bake_meshlets -> Vec<BakedMeshlet>, bake_lod_chain -> Vec<Vec<u32>>; constants MESHLET_TARGET_VERTICES=64, MESHLET_MAX_TRIANGLES=128 -- rounded up from the 126 spec floor because meshopt 0.3 requires max_triangles to be a multiple of 4, documented in the constant; LOD_RATIOS=&[0.5, 0.25, 0.1]). mesh.rs extended: MeshData::bake(v, i) -> HygeResult<MeshData> runs the bake, expands the local u8 triangle indices to global u32 indices into a unified index_data section, concatenates the LOD chain after the base meshlet expansions, and returns a MeshData ready for the writer; Meshlet gains a MeshletCone (center[3] radius apex[3] axis[3] cutoff) computed via meshopt::clusterize::compute_meshlet_bounds; the on-disk format version bumps from 1 to 2 (meshlet_cones section added: 44 bytes per meshlet) and now also includes the LOD chain sections (lod_index_offsets + lod_index_counts, 3 entries). import.rs orchestrator replaced the single-placeholder MeshData path with MeshData::bake end-to-end and switched from a temp-file round-trip to a direct mesh::to_bytes in-memory serialisation. gltf.rs now calls MeshData::bake so every import produces the real meshopt stream. Cargo deps: added meshopt = { workspace = true } to hyge-asset; workspace.dependencies.meshopt pinned to version 0.3 (the existing 'decode/encode/simplifier/cluster' feature names in the workspace pin were invalid -- meshopt 0.3 exposes only bindgen/generate_bindings, the clusterize + simplifier modules are always present -- so the workspace pin is now version-only). Tests: 11 unit tests in meshlet.rs (bake_meshlets_quad_yields_one_meshlet_with_correct_bounds asserts AABB min/max, sphere center, radius, local vertex table shape + sentinel padding, and the 6-byte u8 triangle data; bake_meshlets_is_deterministic + bake_lod_chain_is_deterministic + lod_chain_larger_mesh_shrinks_with_ratio pin the R-035 determinism contract; bake_meshlets_respects_max_triangle_cap pins the 128 cap; bake_meshlets_rejects_oor_index + bake_meshlets_rejects_non_triangle_index_count + bake_lod_chain_rejects_bad_ratio pin the pre-validation errors; bake_lod_chain_emits_three_levels_in_ratio_order pins the 3-LOD structure), 4 new tests in mesh.rs (bake_produces_meshdata_with_meshlets_and_lods, bake_is_deterministic, write_baked_mesh_is_deterministic_across_runs, write_baked_mesh_round_trips_header), and a new golden test r035_meshlet_bake_lands_on_disk_with_three_lods that imports a real glTF and asserts the on-disk .hyge-mesh carries version=2, meshlet_count>=1, lod_count=3 and is byte-identical across two runs. The existing 36 tests (including the 5 golden tests and 1 watcher test for the asset pipeline) all continue to pass. Verification: cargo build --workspace passes, cargo build --workspace --release passes, cargo clippy --workspace --all-targets -- --deny warnings passes, cargo test --workspace passes (no FAILED), cargo doc -p hyge-asset --no-deps produces 0 new warnings (1 pre-existing GltfScene link warning in importer/mod.rs is unrelated to this item). mesh::write was refactored to share the serialisation body via write_into<W: Write> and gain a to_bytes() companion used by the orchestrator."
