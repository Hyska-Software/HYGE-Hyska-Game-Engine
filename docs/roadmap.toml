[[items]]
id = "R-036"
title = "KTX2 transcode (basis-universal)"
phase = "phase_3"
owner = "asset"
priority = "P0"
status = "complete"
completed_at = "2026-06-29"
completion_notes = "Implemented the KTX2 transcode pipeline in crates/hyge-asset/src/importer/. The R-034 KTX1 placeholder was replaced with a real KTX2 container (12-byte magic AB 4B 54 58 20 32 30 BB 0D 0A 1A 0A, 56-byte header, level index, DFD, level data per Khronos KTX 2.0 spec). The new transcode module wires three compression strategies: CompressionMode::Auto (default) shells out to the Khronos toktx CLI for actual BC7 (desktop) or ASTC 4x4 (mobile) supercompression with a full mip chain; falls back to the pure-Rust uncompressed VK_FORMAT_R8G8B8A8_UNORM path when toktx is not on PATH. CompressionMode::Toktx requires toktx (returns HygeError::Unsupported on missing CLI). CompressionMode::Uncompressed uses only the pure-Rust path. The mip chain is generated in pure Rust with a 2x2 box filter (generate_mip_chain in texture.rs) and verified by the per-level sizes in the KTX2 level index. PNG/JPG/EXR sources are decoded by the image crate in hyge-tools cmd/import.rs (PNG + JPEG enabled; EXR supported by the same code path). Non-RGBA8 sources (R8/R8G8/R8G8B8/R16/R16G16/R16G16B16/R16G16B16A16/R32G32B32A32FLOAT) are normalized to RGBA8 by texture::normalize_to_rgba8 before the KTX2 write. The orchestrator (import.rs) now calls transcode::transcode for every source image and marks transcode_pending=false in the ImportReport + per-texture TextureRecord; the meta document records the actual vkFormat (BC7_UNORM_BLOCK=145, ASTC_4X4_UNORM_BLOCK=158, or R8G8B8A8_UNORM=37) and levelCount for every texture. Output is content-addressed: BLAKE3 hash of the on-disk KTX2 bytes -> <hash>.ktx2. New tests: KTX2 magic + header layout, mip chain length matches floor(log2(max))+1, 2x2 box filter averaging, per-level size round-trip, normalize_to_rgba8 for every source format (incl. 16-bit downshift and 32F Reinhard tonemap), transcode_is_content_addressed_and_deterministic, transcode_mode_auto_falls_back_to_uncompressed_without_toktx, transcode_mode_toktx_errors_when_cli_missing, transcode_normalises_non_rgba8_sources, and the golden test r036_ktx2_transcode_writes_real_ktx2_with_mip_chain that imports a real glTF+PNG and asserts the on-disk file is a real KTX2 with 2 mip levels (2x2 source) and vkFormat=37. The hyge-tools import subcommand now also routes standalone .png/.jpg/.jpeg/.exr sources through the transcoder (tested end-to-end with hyge-tools import test.png --out <dir> -> writes <hash>.ktx2 with the KTX2 magic). All workspace tests pass (cargo test --workspace); cargo clippy --workspace --all-targets -- -D warnings is clean; cargo build --workspace --release succeeds. cargo fmt --all -- --check is clean (modulo pre-existing nightly-only rustfmt warnings). The toktx CLI integration is exercised when the Khronos KTX-Software package is installed on PATH; the Auto mode degrades gracefully otherwise so CI stays green."
risk = "medium"
dependencies = ["R-034"]
