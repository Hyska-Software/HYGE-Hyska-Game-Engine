t_mode preferred + fallback + the R-023 acceptance 'device_init_succeeds_on_software_adapter' (uses new_headless with force_fallback_adapter=true, skips on no adapter) + a Debug-format test. The windowed Renderer::new path is exercised by the existing hyge-app smoke test once hyge-app is wired to it; until then, the headless path is the verification surface. No public API change to the render graph (hyge-render-graph is still used the same way from R-024 onwards); the new dependency direction is hyge-app → hyge-window → hyge-core, and hyge-render → hyge-window + hyge-render-graph → hyge-core (no cycles)."
