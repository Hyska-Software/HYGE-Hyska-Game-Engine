completion_notes = """
Implemented the canonical `StaticMesh` renderable component in
`crates/hyge-scene/src/components.rs` with typed
`Handle<MeshAsset>` / `Handle<MaterialAsset>` fields plus a small constructor.

`render_extract_with_culling` now has two integrated renderable paths:
- legacy `MeshHandle` / `MaterialHandle` grouping (preserved for R-043 scenes),
- new `StaticMesh` grouping resolved via `AssetServer::bindless_for`.

The `StaticMesh` path:
- queries `With<StaticMesh>` entities,
- resolves typed handles to bindless `mesh_id` / `material_id`,
- groups by `(mesh_id, material_id)`,
- sorts by `material_id` first via the packed `(material_id << 32) | mesh_id` key,
- emits one `DrawCommand` per group into the same `FrameSnapshot` with contiguous
  `first_instance` offsets shared with the legacy path.

`AssetServer` now implements `Resource` so the extract step can read it from the ECS `World`.

Tests added:
